<div class="sources-page">
  <div class="sources-header">
    <h5 class="mb-0 fw-semibold">Information Sources</h5>
  </div>

  <div class="sources-body">
    <div class="source-grid">

      <a class="source-card" routerLink="/jira" data-testid="sources-jira-link">
        <div class="source-card-icon" style="background: #e7f5ff; color: #1971c2;">
          <i class="bi bi-kanban-fill"></i>
        </div>
        <div class="source-card-body">
          <div class="source-card-title">Jira</div>
          <div class="source-card-desc">Sprint boards, backlog, and issue tracking</div>
        </div>
        <i class="bi bi-chevron-right source-card-arrow"></i>
      </a>

      <a class="source-card" routerLink="/git-repos" data-testid="sources-git-repos-link">
        <div class="source-card-icon" style="background: #fff9db; color: #f08c00;">
          <i class="bi bi-git"></i>
        </div>
        <div class="source-card-body">
          <div class="source-card-title">Git Repositories</div>
          <div class="source-card-desc">Browse commit history by repository and branch</div>
        </div>
        <i class="bi bi-chevron-right source-card-arrow"></i>
      </a>

      <a class="source-card" routerLink="/confluence" data-testid="sources-confluence-link">
        <div class="source-card-icon" style="background: #e6fcf5; color: #0ca678;">
          <i class="bi bi-journal-text"></i>
        </div>
        <div class="source-card-body">
          <div class="source-card-title">Confluence</div>
          <div class="source-card-desc">Knowledge base spaces and pages</div>
        </div>
        <i class="bi bi-chevron-right source-card-arrow"></i>
      </a>

    </div>
  </div>
</div>
