<div class="diagrams-page">
  <div class="diagrams-header">
    <h5 class="mb-0 fw-semibold">Diagrams</h5>
  </div>

  <div class="diagrams-body">
    <div class="diagram-grid">

      <a class="diagram-card" routerLink="/query" data-testid="diagrams-query-link">
        <div class="diagram-card-icon" style="background: #e7f5ff; color: #1971c2;">
          <i class="bi bi-diagram-3-fill"></i>
        </div>
        <div class="diagram-card-body">
          <div class="diagram-card-title">Query</div>
          <div class="diagram-card-desc">Graph queries and architecture exploration</div>
        </div>
        <i class="bi bi-chevron-right diagram-card-arrow"></i>
      </a>

      <a class="diagram-card" routerLink="/sequence" data-testid="diagrams-sequence-link">
        <div class="diagram-card-icon" style="background: #f3f0ff; color: #6741d9;">
          <i class="bi bi-list-columns-reverse"></i>
        </div>
        <div class="diagram-card-body">
          <div class="diagram-card-title">Sequence Diagram</div>
          <div class="diagram-card-desc">Service interaction and call flow diagrams</div>
        </div>
        <i class="bi bi-chevron-right diagram-card-arrow"></i>
      </a>

      <a class="diagram-card" routerLink="/data-flow" data-testid="diagrams-data-flow-link">
        <div class="diagram-card-icon" style="background: #e6fcf5; color: #0ca678;">
          <i class="bi bi-arrow-left-right"></i>
        </div>
        <div class="diagram-card-body">
          <div class="diagram-card-title">Data Flow</div>
          <div class="diagram-card-desc">Service endpoints, queues, and data model visualization</div>
        </div>
        <i class="bi bi-chevron-right diagram-card-arrow"></i>
      </a>

      <a class="diagram-card" routerLink="/functional" data-testid="diagrams-functional-link">
        <div class="diagram-card-icon" style="background: #fff4e6; color: #e8590c;">
          <i class="bi bi-file-earmark-text"></i>
        </div>
        <div class="diagram-card-body">
          <div class="diagram-card-title">Functional Docs</div>
          <div class="diagram-card-desc">Functional documentation viewer</div>
        </div>
        <i class="bi bi-chevron-right diagram-card-arrow"></i>
      </a>

    </div>
  </div>
</div>
